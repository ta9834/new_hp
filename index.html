<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>株式会社PAS企画 | Professional Adviser Service</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&family=Montserrat:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --ink: #1a1a1a;
    --ink-2: #4a4a4a;
    --ink-3: #888;
    --ink-4: #b5b5b5;
    --bg: #ffffff;
    --bg-2: #f7f7f8;
    --line: #e5e5e5;
    --line-2: #ececec;

    /* prismatic rainbow — the key HIROKEI moment */
    --c1: #8b7dd8; /* violet */
    --c2: #7aa5d2; /* blue */
    --c3: #7dc9b7; /* teal */
    --c4: #cdd67a; /* yellow-green */
    --c5: #f0b87a; /* warm */
    --c6: #e89aae; /* pink */
    --c7: #d48fb8; /* magenta */

    /* purple for contact band */
    --pur-1: #c5b8e8;
    --pur-2: #b7a9dd;
    --pur-3: #9d8fcc;

    --font-jp: "Noto Sans JP", sans-serif;
    --font-en: "Montserrat", "Inter", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  html, body {
    color: var(--ink);
    font-family: var(--font-jp);
    font-feature-settings: "palt" 1;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.7;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  img { max-width: 100%; display: block; }
  .en { font-family: var(--font-en); letter-spacing: 0.04em; }
  .wrap { max-width: 1240px; margin: 0 auto; padding: 0 40px; }
  @media (max-width: 820px){ .wrap { padding: 0 20px; } }

  /* prismatic text — gradient fill for big EN title */
  .prismatic {
    background: linear-gradient(90deg,
      var(--c1) 0%, var(--c2) 16%, var(--c3) 32%,
      var(--c4) 50%, var(--c5) 68%, var(--c6) 84%, var(--c7) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  /* READ MORE button — small circle with arrow + text beside it */
  .circle-btn {
    display: inline-flex; flex-direction: row; align-items: center; gap: 16px;
    width: auto; height: auto; border: 0; padding: 0; background: transparent;
    font-size: 0; /* hide inner text nodes ("READ", "MORE") */
    color: var(--ink);
    transition: gap .3s;
  }
  .circle-btn::before {
    content: ""; display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; border-radius: 999px; border: 1px solid var(--pur-3);
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M5.5 3.5 L11 8 L5.5 12.5 Z' fill='%23a899dd'/></svg>") center / 10px 10px no-repeat;
    transition: background-color .3s, transform .3s;
    flex-shrink: 0;
  }
  .circle-btn::after {
    content: "READ MORE";
    font-family: var(--font-en); font-size: 12px; letter-spacing: 0.22em; font-weight: 600;
  }
  .circle-btn:hover { gap: 20px; }
  .circle-btn:hover::before { transform: scale(1.08); }

  /* section eyebrow style (OUR SOLUTIONS etc) */
  .section-eyebrow {
    text-align: center;
  }
  .section-eyebrow .ja {
    display: block;
    font-size: 36px; font-weight: 700; letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .section-eyebrow .en {
    display: block;
    font-size: 11px; letter-spacing: 0.24em;
    color: var(--ink-3);
  }

  .pill-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 10px 22px; border-radius: 999px; border: 1px solid var(--ink);
    font-size: 13px; font-weight: 500;
    transition: background .24s, color .24s;
  }
  .pill-btn:hover { background: var(--ink); color: #fff; }

  /* scroll reveal */
  .reveal { opacity: 0; transform: translateY(32px); transition: opacity .9s cubic-bezier(.22,.61,.36,1), transform .9s cubic-bezier(.22,.61,.36,1); }
  .reveal.in { opacity: 1; transform: none; }
  .reveal-slow { transition-duration: 1.3s; }
  .reveal-delay-1 { transition-delay: .12s; }
  .reveal-delay-2 { transition-delay: .24s; }
  .reveal-delay-3 { transition-delay: .36s; }
  .reveal-delay-4 { transition-delay: .48s; }

  /* continuous wave drift */
  @keyframes waveDrift { from { transform: translateX(0); } to { transform: translateX(-800px); } }
  .wave-anim { animation: waveDrift 40s linear infinite; }

  /* vertical wave ripple */
  @keyframes wavePulse {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* hero letter stagger entrance */
  @keyframes heroLetter {
    from { opacity: 0; transform: translateY(40px); filter: blur(8px); }
    to { opacity: 1; transform: none; filter: none; }
  }
  .hero-letter {
    display: inline-block;
    opacity: 0;
    animation: heroLetter 1.1s cubic-bezier(.22,.61,.36,1) forwards;
  }
  .hero-letter-wrap {
    display: inline-block;
    opacity: 0;
    animation: heroLetter 1.1s cubic-bezier(.22,.61,.36,1) forwards;
  }

  /* scattered phrase fade-in */
  @keyframes phraseFloat {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: none; }
  }
  .scatter-phrase {
    opacity: 0;
    animation: phraseFloat 1.6s cubic-bezier(.22,.61,.36,1) forwards;
  }

  /* float loop (used for hero logo pulse) */
  @keyframes gentleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .gentle-float { animation: gentleFloat 5s ease-in-out infinite; }

  /* circle expand on reveal */
  @keyframes circleExpand {
    from { transform: scale(.82); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .circle-expand { animation: circleExpand 1.1s cubic-bezier(.22,.61,.36,1) both; }

  /* underline draw */
  @keyframes drawUnderline {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }

  /* marquee for logos */
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .marquee-track { animation: marquee 40s linear infinite; display: flex; }
  .marquee-track:hover { animation-play-state: paused; }

  /* accent rainbow gradient shift */
  @keyframes hueShift { 0% { filter: hue-rotate(0); } 100% { filter: hue-rotate(30deg); } }
  .prismatic-animated { background-size: 200% auto; animation: prismaShift 8s ease-in-out infinite alternate; }
  @keyframes prismaShift { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    .reveal { opacity: 1 !important; transform: none !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "heroBg": "waves",
      "accent": "blue"
    }/*EDITMODE-END*/;
    try {
      const saved = JSON.parse(localStorage.getItem("pas_tweaks") || "{}");
      window.__TWEAKS__ = { ...TWEAK_DEFAULTS, ...saved };
    } catch(e){ window.__TWEAKS__ = { ...TWEAK_DEFAULTS }; }
  </script>

  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/anim.jsx"></script>
  <script type="text/babel" src="src/waves.jsx"></script>
  <script type="text/babel" src="src/chrome.jsx"></script>
  <script type="text/babel" src="src/home.jsx"></script>
  <script type="text/babel" src="src/pages.jsx"></script>
  <script type="text/babel" src="src/tweaks.jsx"></script>
  <script type="text/babel" src="src/root.jsx"></script>
</body>
</html>
